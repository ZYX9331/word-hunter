<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-content">
<meta name="theme-color" content="#0f1923">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>单词猎手 Word Hunter</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Noto+Sans+SC:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0f1923;
  --surface:   #192330;
  --card:      #1e2d3d;
  --border:    #263545;
  --txt:       #e8edf2;
  --txt-dim:   #5c7a96;
  --txt-muted: #3a5068;
  --mint:      #00d9a3;
  --mint-dim:  rgba(0,217,163,0.15);
  --coral:     #ff6b6b;
  --coral-dim: rgba(255,107,107,0.18);
  --gold:      #ffc94d;
  --gold-dim:  rgba(255,201,77,0.18);

  /* 格子尺寸：10格 + 9个2px间距，两侧各16px内边距 */
  --cell-size: calc((min(100vw, 500px) - 32px - 18px) / 10);
  --radius:    14px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html { height: 100%; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--txt);
  font-family: 'Noto Sans SC', sans-serif;
  max-width: 500px;
  margin: 0 auto;
  padding-bottom: calc(100px + env(safe-area-inset-bottom));
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  -webkit-font-smoothing: antialiased;
}

/* ── TOP BAR ── */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px 10px;
  padding-top: calc(12px + env(safe-area-inset-top));
  position: sticky; top: 0; z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
}

.topbar-score {
  display: flex; flex-direction: column; align-items: center;
}
.score-label {
  font-size: 10px; letter-spacing: 2px;
  color: var(--txt-muted); text-transform: uppercase;
}
.score-num {
  font-family: 'Righteous', sans-serif;
  font-size: 26px; color: var(--mint); line-height: 1;
}
.score-num span { font-family: 'Noto Sans SC', sans-serif; font-size: 14px; color: var(--txt-muted); }

.timer-pill {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 18px; font-weight: 700;
  color: var(--txt); letter-spacing: 2px;
  transition: color .3s, border-color .3s;
}
.timer-pill.urgent { color: var(--coral); border-color: var(--coral); animation: pulse-red .8s infinite; }
@keyframes pulse-red { 0%,100%{box-shadow:none} 50%{box-shadow:0 0 12px rgba(255,107,107,.4)} }

.topbar-btn {
  width: 44px; height: 44px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; cursor: pointer; color: var(--txt-dim);
  transition: color .15s;
  /* 移动端增大点击区域 */
  touch-action: manipulation;
}
.topbar-btn:active { transform: scale(.93); }

/* ── GRID ── */
.grid-section {
  padding: 14px 16px 8px;
  display: flex; justify-content: center;
  flex-shrink: 0;
}

.grid {
  display: grid;
  grid-template-columns: repeat(10, var(--cell-size));
  grid-template-rows:    repeat(10, var(--cell-size));
  gap: 2px;
  background: var(--border);
  /* border-radius: var(--radius); */
  overflow: hidden;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
  user-select: none;
  touch-action: none;
}

.cell {
  width: var(--cell-size); height: var(--cell-size);
  display: flex; align-items: center; justify-content: center;
  background: var(--surface);
  font-family: 'Space Mono', monospace; font-weight: 700;
  font-size: calc(var(--cell-size) * 0.4);
  color: var(--txt);
  transition: background .15s, color .15s;
  position: relative;
  /* 字母小写显示 */
  text-transform: lowercase;
}
.cell.draft {
  background: var(--coral-dim); color: var(--coral);
  outline: 1.5px solid rgba(255,107,107,.5); outline-offset: -1px; z-index: 1;
}
/* 找到：只变色，不加删除线 */
.cell.found {
  background: var(--mint-dim);
  color: var(--mint);
}

@keyframes pop {
  0%   { transform: scale(1); }
  35%  { transform: scale(1.3); }
  65%  { transform: scale(0.95); }
  100% { transform: scale(1); }
}
.cell.pop { animation: pop .35s cubic-bezier(.36,.07,.19,.97); }

/* ── CELL HINT (idle flash) ── */
@keyframes cell-hint {
  0%,100% { background: var(--surface); color: var(--txt); }
  30%,70% { background: var(--gold-dim); color: var(--gold); box-shadow: inset 0 0 0 1.5px var(--gold); }
}
.cell.hint { animation: cell-hint 0.7s ease 4; }

/* ── INPUT SECTION ── */
.input-section { 
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 10px 16px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom));
  background: var(--bg);
  z-index: 100;
  max-width: 500px;
  margin: 0 auto;
  border-top: 1px solid var(--border);
}

.input-row { display: flex; gap: 10px; align-items: center; }

.input-field {
  flex: 1;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 22px; padding: 12px 18px;
  font-family: 'Noto Sans SC', sans-serif; font-size: 16px;
  color: var(--txt); outline: none;
  transition: border-color .2s, box-shadow .2s;
  /* 防止 iOS 自动缩放 */
  font-size: max(16px, 1em);
}
.input-field::placeholder { color: var(--txt-muted); }
.input-field:focus { border-color: var(--mint); box-shadow: 0 0 0 3px var(--mint-dim); }
.input-field.shake { animation: shake .35s ease; border-color: var(--coral); box-shadow: 0 0 0 3px var(--coral-dim); }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 60%{transform:translateX(6px)} 80%{transform:translateX(-3px)} }

.submit-btn, .mic-btn {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--mint); border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; cursor: pointer; flex-shrink: 0;
  color: #0f1923; transition: transform .15s, opacity .15s;
  touch-action: manipulation;
}
.mic-btn { background: var(--accent); color: #fff; }
.mic-btn.listening {
  background: #ef4444;
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.1); }
}
.submit-btn:active, .mic-btn:active { transform: scale(.92); opacity: .85; }

.feedback-row {
  min-height: 20px; margin-top: 8px;
  font-size: 12px; color: var(--txt-muted);
  padding: 0 4px;
  transition: color .2s;
}
.feedback-row.ok   { color: var(--mint); }
.feedback-row.fail { color: var(--coral); }

/* ── DIVIDER & UPLOAD ── */
.divider-row {
  padding: 16px 16px 4px;
  display: flex; align-items: center; gap: 10px;
  color: var(--txt-muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
}
.divider-row::before, .divider-row::after { content: ''; flex: 1; height: 1px; background: var(--border); }

.import-section { padding: 0 16px 24px; }

.upload-card {
  background: var(--card); border: 1.5px dashed var(--border);
  border-radius: var(--radius); padding: 20px;
  text-align: center; cursor: pointer; display: block;
  transition: border-color .2s;
  touch-action: manipulation;
}
.upload-card:hover, .upload-card:active { border-color: var(--mint); }
.upload-icon { font-size: 26px; margin-bottom: 6px; }
.upload-main { font-size: 14px; font-weight: 700; color: var(--txt); margin-bottom: 4px; }
.upload-sub  { font-size: 12px; color: var(--txt-muted); line-height: 1.6; }
input[type="file"] { display: none; }

/* ── CSV 加载状态提示 ── */
.lib-status {
  margin: 0 16px 0;
  padding: 8px 14px;
  border-radius: 10px;
  font-size: 12px;
  color: var(--txt-muted);
  background: var(--card);
  border: 1px solid var(--border);
  display: none;
  align-items: center;
  gap: 8px;
}
.lib-status.show { display: flex; }
.lib-status.ok   { color: var(--mint); border-color: rgba(0,217,163,.25); }
.lib-status.fail { color: var(--coral); border-color: rgba(255,107,107,.25); }

/* ── DIFFICULTY SELECTOR ── */
.difficulty-section {
  margin: 0 16px 16px;
  padding: 14px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
}
.difficulty-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  color: var(--txt-dim);
  margin-bottom: 10px;
}
.difficulty-label span:last-child {
  font-weight: 700;
  color: var(--mint);
}
.difficulty-slider {
  width: 100%;
  height: 6px;
  -webkit-appearance: none;
  appearance: none;
  background: var(--border);
  border-radius: 3px;
  outline: none;
}
.difficulty-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 20px;
  height: 20px;
  background: var(--mint);
  border-radius: 50%;
  cursor: pointer;
  box-shadow: 0 2px 6px rgba(0,217,163,.4);
}
.difficulty-slider::-moz-range-thumb {
  width: 20px;
  height: 20px;
  background: var(--mint);
  border-radius: 50%;
  cursor: pointer;
  border: none;
  box-shadow: 0 2px 6px rgba(0,217,163,.4);
}
.difficulty-hint {
  margin-top: 8px;
  font-size: 11px;
  color: var(--txt-muted);
  text-align: center;
}

/* ── TOAST ── */
.toast {
  position: fixed; top: 70px; left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: var(--card); border: 1px solid var(--border);
  border-radius: 20px; padding: 8px 20px;
  font-size: 14px; white-space: nowrap;
  opacity: 0; transition: opacity .2s, transform .2s;
  z-index: 100; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok   { color: var(--mint);  border-color: rgba(0,217,163,.3); }
.toast.fail { color: var(--coral); border-color: rgba(255,107,107,.3); }

/* ── OVERLAY ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(10,18,28,.88); backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  align-items: center; justify-content: center; z-index: 200; padding: 24px;
}
.overlay.show { display: flex; }
.overlay-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 24px; padding: 36px 28px; width: 100%; max-width: 340px;
  text-align: center; box-shadow: 0 24px 60px rgba(0,0,0,.6);
}
.overlay-emoji { font-size: 52px; margin-bottom: 12px; }
.overlay-title { font-family: 'Righteous', sans-serif; font-size: 28px; margin-bottom: 8px; }
.overlay-msg   { font-size: 15px; color: var(--txt-dim); line-height: 1.7; margin-bottom: 28px; }
.overlay-msg strong { color: var(--mint); }
.restart-btn {
  background: var(--mint); color: #0f1923; border: none;
  border-radius: 14px; font-family: 'Noto Sans SC', sans-serif;
  font-weight: 700; font-size: 16px; padding: 14px 36px;
  cursor: pointer; width: 100%; transition: opacity .15s;
  touch-action: manipulation;
}
.restart-btn:active { opacity: .85; }

/* ── 响应式：更小屏幕适配 ── */
@media (max-width: 360px) {
  :root { --cell-size: calc((100vw - 32px - 18px) / 10); }
  .score-num { font-size: 22px; }
  .timer-pill { font-size: 16px; padding: 5px 10px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-btn" id="pauseBtn" onclick="togglePause()">⏸</div>
  <div class="topbar-score">
    <div class="score-label">已找到</div>
    <div class="score-num" id="scoreDisplay">0 <span>/ 0</span></div>
  </div>
  <div class="timer-pill" id="timer">03:00</div>
</div>

<!-- GRID -->
<div class="grid-section">
  <div class="grid" id="grid"></div>
</div>

<!-- INPUT -->
<div class="input-section">
  <div class="input-row">
    <input class="input-field" id="answerInput" type="text"
      placeholder="输入中文释义或点击🎤语音" autocomplete="off" autocorrect="off"
      autocapitalize="none" spellcheck="false" enterkeyhint="done"
      inputmode="text">
    <button class="mic-btn" id="micBtn" onclick="toggleSpeech()">🎤</button>
    <button class="submit-btn" onclick="checkAnswer()">↩</button>
  </div>
  <div class="feedback-row" id="feedback"></div>
</div>



<!-- CSV 状态 -->
<div class="lib-status" id="libStatus"></div>

<!-- DIFFICULTY SELECTOR -->
<div class="difficulty-section">
  <div class="difficulty-label">
    <span>游戏难度</span>
    <span id="difficultyName">简单</span>
  </div>
  <input type="range" class="difficulty-slider" id="difficultySlider" min="0" max="2" value="0">
  <div class="difficulty-hint" id="difficultyHint">提示间隔 5 秒</div>
</div>

<!-- DIVIDER + UPLOAD -->
<div class="divider-row">导入题库</div>
<div class="import-section">
  <label class="upload-card" for="csvInput">
    <div class="upload-icon">📂</div>
    <div class="upload-main">上传自定义 CSV 词库</div>
    <div class="upload-sub">
      格式：每行 <code style="color:var(--mint)">单词,中文释义</code><br>
      多释义：<code style="color:var(--mint)">book,书|书本|书籍</code><br>
      支持 CET-4 标准格式（含词性前缀）
    </div>
  </label>
  <input type="file" id="csvInput" accept=".csv,.txt">
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-card">
    <div class="overlay-emoji" id="overlayEmoji">🎉</div>
    <div class="overlay-title" id="overlayTitle">完成！</div>
    <div class="overlay-msg" id="overlayMsg"></div>
    <button class="restart-btn" onclick="resetGame()">再来一局</button>
  </div>
</div>

<script>
// ══════ CONFIG ══════
const GRID_SIZE  = 10;
const TOTAL_TIME = 180;

// 难度配置：简单 5s，中等 10s，困难 20s
const DIFFICULTY = {
  0: { name: '简单', hint: 5 },
  1: { name: '中等', hint: 10 },
  2: { name: '困难', hint: 20 },
};
let currentDifficulty = 0; // 默认简单
let IDLE_WARN = DIFFICULTY[0].hint;

const DEFAULT_LIB = [
  ['apple',['苹果','苹果树']], ['book',['书','书本','书籍']], ['cat',['猫','猫咪']],
  ['dog',['狗','狗狗']],       ['fish',['鱼','鱼类']],        ['house',['房子','房屋','住宅']],
  ['king',['国王','君主']],    ['lamp',['灯','台灯']],         ['moon',['月亮','月球']],
  ['nest',['鸟巢','巢']],      ['tree',['树','树木']],         ['star',['星星','星','恒星']],
  ['water',['水']],             ['cloud',['云','云朵']],        ['earth',['地球','大地']],
  ['flame',['火','火焰']],      ['river',['河流','河']],        ['tiger',['老虎','虎']],
  ['snake',['蛇']],             ['bread',['面包']],             ['clock',['时钟','钟']],
  ['dream',['梦','梦想']],      ['eagle',['鹰','老鹰']],        ['heart',['心','心脏','心灵']],
  ['juice',['果汁','汁']],      ['light',['光','光线','灯光']], ['music',['音乐','乐']],
  ['night',['夜晚','夜','黑夜']],['paper',['纸','纸张']],
];

// ══════ CET-4 CSV 解析 ══════
// 处理格式：word,v. 放弃，抛弃  或  word,书|书本  等
// 策略：先按 | 分割，再对每段提取中文字符（去掉词性前缀）
function parseCET4Meanings(raw) {
  // 先尝试按 | 分割
  const parts = raw.split('|').map(s => s.trim()).filter(Boolean);
  const results = new Set();

  for (const part of parts) {
    // 去掉词性标记前缀：v. / n. / adj. / adv. / prep. / conj. / pron. / num. / art. / interj. / aux.
    // 以及括号内的英文说明
    let cleaned = part
      // 去掉词性前缀 "v. " "n. " "adj. " 等（行首或分号后）
      .replace(/(?:^|[；;])\s*(?:v|n|adj|adv|prep|conj|pron|num|art|interj|aux|vt|vi|vt\.\/vi)\.\s*/g, ' ')
      // 去掉括号里的英文说明 (sth) (sb) etc.
      .replace(/\([a-zA-Z./\s]+\)/g, '')
      // 去掉多余空格
      .trim();

    // 按中文标点（，、；）和英文逗号分割，提取每个中文片段
    const segments = cleaned.split(/[，,；;、]+/).map(s => s.trim()).filter(s => {
      // 只保留包含中文字符的片段
      return s && /[\u4e00-\u9fff]/.test(s);
    });

    segments.forEach(s => {
      // 最终清理：去掉段首的英文和符号残留
      const final = s.replace(/^[a-zA-Z.\s\/]+/, '').trim();
      if (final && /[\u4e00-\u9fff]/.test(final)) results.add(final);
    });
  }

  return [...results];
}

function parseCSV(text) {
  const parsed = [];
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);

  for (const line of lines) {
    const idx = line.indexOf(',');
    if (idx < 1) continue;

    const word = line.slice(0, idx).trim().replace(/[^a-zA-Z]/g, '');
    if (!word || word.length < 2 || word.length > GRID_SIZE) continue;

    const rawMeaning = line.slice(idx + 1).trim();
    const meanings = parseCET4Meanings(rawMeaning);

    if (meanings.length) parsed.push([word, meanings]);
  }
  return parsed;
}

// ══════ STATE ══════
let wordLib     = DEFAULT_LIB;
let gridData    = [];
let placedWords = [];
let foundSet    = new Set();
let draftSet    = new Set();
let isDragging  = false;
let timeLeft    = TOTAL_TIME;
let timerInt    = null;
let paused      = false;
let lastAction  = Date.now();
let idleInt     = null;

// ══════ GRID GEN ══════
function emptyGrid() {
  return Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(''));
}

function canPlace(g, word, r, c, dir) {
  for (let i = 0; i < word.length; i++) {
    const rr = dir === 'H' ? r : r + i;
    const cc = dir === 'H' ? c + i : c;
    if (rr >= GRID_SIZE || cc >= GRID_SIZE) return false;
    if (g[rr][cc] !== '' && g[rr][cc] !== word[i]) return false;
  }
  return true;
}

function placeWord(g, word, r, c, dir) {
  const cells = [];
  for (let i = 0; i < word.length; i++) {
    const rr = dir === 'H' ? r : r + i;
    const cc = dir === 'H' ? c + i : c;
    g[rr][cc] = word[i]; cells.push([rr, cc]);
  }
  return cells;
}

function fillRandom(g) {
  // 小写随机字母填充
  const L = 'abcdefghijklmnopqrstuvwxyz';
  for (let r = 0; r < GRID_SIZE; r++)
    for (let c = 0; c < GRID_SIZE; c++)
      if (!g[r][c]) g[r][c] = L[Math.floor(Math.random() * 26)];
}

function generate(words) {
  const g = emptyGrid(), placed = [];
  const sorted = [...words].sort((a, b) => b[0].length - a[0].length);
  for (const [word, meanings] of sorted) {
    const w = word.toLowerCase();  // 小写存储
    if (w.length > GRID_SIZE) continue;
    let ok = false;
    for (let t = 0; t < 400 && !ok; t++) {
      const dir = Math.random() < .5 ? 'H' : 'V';
      const maxR = dir === 'H' ? GRID_SIZE : GRID_SIZE - w.length;
      const maxC = dir === 'H' ? GRID_SIZE - w.length : GRID_SIZE;
      if (maxR <= 0 || maxC <= 0) continue;
      const r = Math.floor(Math.random() * maxR);
      const c = Math.floor(Math.random() * maxC);
      if (canPlace(g, w, r, c, dir)) {
        placed.push({ word: w, meanings, cells: placeWord(g, w, r, c, dir) });
        ok = true;
      }
    }
  }
  fillRandom(g);
  return { g, placed };
}

// ══════ RENDER GRID ══════
function renderGrid() {
  const el = document.getElementById('grid');
  el.innerHTML = '';
  for (let r = 0; r < GRID_SIZE; r++) {
    for (let c = 0; c < GRID_SIZE; c++) {
      const d = document.createElement('div');
      d.className = 'cell';
      d.textContent = gridData[r][c];  // 已是小写
      d.dataset.r = r; d.dataset.c = c;
      el.appendChild(d);
    }
  }
  applyVisual();
}

function applyVisual() {
  const foundIdx = new Set();
  placedWords.forEach(pw => {
    if (foundSet.has(pw.word)) pw.cells.forEach(([r, c]) => foundIdx.add(`${r},${c}`));
  });
  document.querySelectorAll('.cell').forEach(cell => {
    const key = `${cell.dataset.r},${cell.dataset.c}`;
    cell.classList.toggle('draft', !foundIdx.has(key) && draftSet.has(key));
    cell.classList.toggle('found', foundIdx.has(key));
  });
}

function popCells(cells) {
  cells.forEach(([r, c]) => {
    const el = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    if (!el) return;
    el.classList.remove('pop');
    void el.offsetWidth;
    el.classList.add('pop');
    setTimeout(() => el.classList.remove('pop'), 380);
  });
}

// ══════ SCORE ══════
function renderChips() {
  const total = placedWords.length, done = foundSet.size;
  document.getElementById('scoreDisplay').innerHTML = `${done} <span>/ ${total}</span>`;
}

// ══════ DRAG ══════
const gridEl = document.getElementById('grid');
function cellAt(x, y) { return document.elementFromPoint(x, y)?.closest('.cell') || null; }

gridEl.addEventListener('mousedown', e => {
  const c = e.target.closest('.cell'); if (!c) return;
  isDragging = true; draftSet.clear(); draftSet.add(`${c.dataset.r},${c.dataset.c}`); applyVisual();
});
gridEl.addEventListener('mouseover', e => {
  if (!isDragging) return;
  const c = e.target.closest('.cell'); if (c) { draftSet.add(`${c.dataset.r},${c.dataset.c}`); applyVisual(); }
});
document.addEventListener('mouseup', () => { isDragging = false; });

gridEl.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0], c = cellAt(t.clientX, t.clientY);
  if (c) { isDragging = true; draftSet.clear(); draftSet.add(`${c.dataset.r},${c.dataset.c}`); applyVisual(); }
}, { passive: false });
gridEl.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0], c = cellAt(t.clientX, t.clientY);
  if (c) { draftSet.add(`${c.dataset.r},${c.dataset.c}`); applyVisual(); }
}, { passive: false });
document.addEventListener('touchend', () => { isDragging = false; });

// ══════ SYNONYM MATCH ══════
function meaningMatch(meanings, input) {
  const v = input.trim();
  if (!v) return false;
  return meanings.some(m => m === v || m.includes(v) || v.includes(m));
}

// ══════ CHECK ANSWER ══════
function checkAnswer() {
  const inp = document.getElementById('answerInput');
  const val = inp.value.trim();
  if (!val) return;
  bumpIdle();

  const match = placedWords.find(pw => !foundSet.has(pw.word) && meaningMatch(pw.meanings, val));

  if (match) {
    foundSet.add(match.word);
    draftSet.clear();
    inp.value = '';
    setFeedback('✓ 正确！', 'ok');
    applyVisual(); popCells(match.cells); renderChips();
    showToast('✓ 正确！', 'ok');

    if (foundSet.size === placedWords.length) {
      clearInterval(timerInt); clearInterval(idleInt);
      const used = TOTAL_TIME - timeLeft;
      setTimeout(() => showOverlay('🏆', '全部找到！',
        `用时 ${fmt(used)}，完成了全部 <strong>${placedWords.length}</strong> 个单词！`), 400);
    }
  } else {
    const alreadyDone = placedWords.some(pw => foundSet.has(pw.word) && meaningMatch(pw.meanings, val));
    const msg = alreadyDone ? '已经找过了 ✓' : '没有匹配，再想想~';
    setFeedback(msg, 'fail');
    showToast(msg, 'fail');
    inp.classList.add('shake');
    setTimeout(() => inp.classList.remove('shake'), 400);
  }
}

document.getElementById('answerInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
  bumpIdle();
});
document.getElementById('answerInput').addEventListener('input', bumpIdle);

// ══════ 语音识别 ══════
let recognition = null;
let isListening = false;

function initSpeech() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    showToast('您的浏览器不支持语音识别', 'fail');
    return;
  }
  recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'zh-CN';

  recognition.onresult = (event) => {
    let finalText = '';
    let interimText = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) {
        finalText += t;
      } else {
        interimText += t;
      }
    }
    // 实时显示正在识别的文字
    const inp = document.getElementById('answerInput');
    if (interimText) inp.value = interimText;
    // 最终结果：填入并自动提交
    if (finalText) {
      inp.value = finalText;
      bumpIdle();
    }
  };

  recognition.onerror = (event) => {
    // no-speech 和 aborted 不提示，其他才报错
    if (event.error !== 'no-speech' && event.error !== 'aborted') {
      showToast('语音识别出错: ' + event.error, 'fail');
    }
    // 如果还在监听模式，自动重启
    if (isListening) {
      try { recognition.start(); } catch(e) {}
    }
  };

  recognition.onend = () => {
    // 如果用户没手动关闭，自动重启保持持续监听
    if (isListening) {
      try { recognition.start(); } catch(e) {}
    }
  };
}

function toggleSpeech() {
  if (!recognition) initSpeech();
  if (!recognition) return;

  if (isListening) {
    isListening = false;
    try { recognition.stop(); } catch(e) {}
    document.getElementById('micBtn').classList.remove('listening');
    showToast('语音已关闭', 'fail');
  } else {
    try {
      recognition.start();
      isListening = true;
      document.getElementById('micBtn').classList.add('listening');
      showToast('🎤 持续监听中，请说话…', 'ok');
    } catch (e) {
      showToast('启动语音失败，请用Chrome浏览器', 'fail');
    }
  }
}

function stopListening() {
  isListening = false;
  const btn = document.getElementById('micBtn');
  if (btn) btn.classList.remove('listening');
}

function setFeedback(msg, type) {
  const el = document.getElementById('feedback');
  el.textContent = msg; el.className = 'feedback-row ' + type;
  clearTimeout(setFeedback._t);
  setFeedback._t = setTimeout(() => { el.textContent = ''; el.className = 'feedback-row'; }, 2500);
}

// ══════ TOAST ══════
let toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
}

// ══════ LIB STATUS ══════
function setLibStatus(msg, type) {
  const el = document.getElementById('libStatus');
  el.textContent = msg; el.className = `lib-status show ${type}`;
}

// ══════ IDLE — flash cells of a random unfound word ══════
function bumpIdle() { lastAction = Date.now(); }

function fireIdleHint() {
  const unfound = placedWords.filter(pw => !foundSet.has(pw.word));
  if (!unfound.length) return;
  const pw = unfound[Math.floor(Math.random() * unfound.length)];
  pw.cells.forEach(([r, c]) => {
    const el = document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    if (!el) return;
    el.classList.remove('hint');
    void el.offsetWidth;
    el.classList.add('hint');
    setTimeout(() => el.classList.remove('hint'), 0.7 * 4 * 1000 + 100);
  });
}

function startIdleWatch() {
  clearInterval(idleInt);
  idleInt = setInterval(() => {
    if (paused) return;
    if ((Date.now() - lastAction) / 1000 >= IDLE_WARN) { fireIdleHint(); bumpIdle(); }
  }, 1000);
}

// ══════ TIMER ══════
function fmt(s) {
  return `${String(Math.floor(s / 60)).padStart(2, '0')}:${String(s % 60).padStart(2, '0')}`;
}

function startTimer() {
  clearInterval(timerInt); timeLeft = TOTAL_TIME;
  const el = document.getElementById('timer');
  el.classList.remove('urgent'); el.textContent = fmt(timeLeft);
  timerInt = setInterval(() => {
    if (paused) return;
    timeLeft--; el.textContent = fmt(timeLeft);
    if (timeLeft <= 30) el.classList.add('urgent');
    if (timeLeft <= 0) {
      clearInterval(timerInt); clearInterval(idleInt);
      showOverlay(
        foundSet.size === placedWords.length ? '🏆' : '⏱',
        '时间到！',
        `找到了 <strong>${foundSet.size}</strong> / ${placedWords.length} 个单词`
      );
    }
  }, 1000);
}

function togglePause() {
  paused = !paused;
  document.getElementById('pauseBtn').textContent = paused ? '▶' : '⏸';
}

// ══════ OVERLAY ══════
function showOverlay(emoji, title, msg) {
  document.getElementById('overlayEmoji').textContent = emoji;
  document.getElementById('overlayTitle').textContent = title;
  document.getElementById('overlayMsg').innerHTML = msg;
  document.getElementById('overlay').classList.add('show');
}

// ══════ CSV FILE UPLOAD ══════
document.getElementById('csvInput').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const parsed = parseCSV(ev.target.result);
    if (parsed.length) {
      wordLib = parsed;
      resetGame();
      setLibStatus(`✓ 已加载 ${parsed.length} 个单词`, 'ok');
    } else {
      alert('CSV 解析失败，格式：单词,释义1|释义2');
    }
    e.target.value = '';
  };
  reader.readAsText(file, 'UTF-8');
});

// ══════ RESET ══════
function resetGame() {
  document.getElementById('overlay').classList.remove('show');
  foundSet.clear(); draftSet.clear();
  document.getElementById('answerInput').value = '';
  document.getElementById('feedback').textContent = '';
  paused = false; document.getElementById('pauseBtn').textContent = '⏸';

  const shuffled = [...wordLib].sort(() => Math.random() - .5).slice(0, 16);
  const res = generate(shuffled);
  gridData = res.g; placedWords = res.placed;

  renderGrid(); renderChips(); startTimer(); bumpIdle(); startIdleWatch();
  window.scrollTo(0, 0);
}

// ══════ DIFFICULTY SELECTOR ══════
document.getElementById('difficultySlider').addEventListener('input', e => {
  currentDifficulty = parseInt(e.target.value);
  IDLE_WARN = DIFFICULTY[currentDifficulty].hint;
  document.getElementById('difficultyName').textContent = DIFFICULTY[currentDifficulty].name;
  document.getElementById('difficultyHint').textContent = `提示间隔 ${IDLE_WARN} 秒`;
  // 如果游戏进行中，重启 idle 监视器
  if (placedWords.length && !paused) {
    bumpIdle();
    startIdleWatch();
  }
});

// ══════ AUTO-LOAD CET4 CSV ══════
// 先用默认词库启动，再异步加载 CET4 词库
resetGame();

(function loadCET4() {
  // 尝试加载 cet4-high-frequency-words.csv（需要 HTTP 服务器环境）
  fetch('./cet4-high-frequency-words.csv')
    .then(r => { if (!r.ok) throw new Error('not found'); return r.text(); })
    .then(text => {
      const parsed = parseCSV(text);
      if (parsed.length >= 10) {
        wordLib = parsed;
        resetGame();
        setLibStatus(`✓ CET-4 词库已加载（${parsed.length} 词）`, 'ok');
      }
    })
    .catch(() => {
      // file:// 协议下无法加载，静默忽略，使用默认词库
    });
})();
</script>

<script>
// ══════ 移动端键盘适配（独立脚本块，确保在 DOM 之后） ══════
(function() {
  const inputSection = document.querySelector('.input-section');
  if (!inputSection) return;

  // 阻止页面被键盘顶上去：监听 touchmove 阻止过度滚动
  document.body.addEventListener('touchmove', function(e) {
    if (document.activeElement && document.activeElement.tagName === 'INPUT') {
      // 输入框聚焦时，只允许在 visualViewport 范围内滚动
      // 不阻止默认行为，让系统自己处理
    }
  }, { passive: true });

  // 用 visualViewport API 动态定位输入框
  if (window.visualViewport) {
    function updateInputPosition() {
      const vv = window.visualViewport;
      // 输入框贴在 visualViewport 底部
      inputSection.style.position = 'fixed';
      inputSection.style.top = (vv.top + vv.height - inputSection.offsetHeight) + 'px';
      inputSection.style.left = '0';
      inputSection.style.width = '100%';
    }

    // 输入框聚焦时开始监听
    const answerInput = document.getElementById('answerInput');
    let active = false;

    answerInput.addEventListener('focus', function() {
      active = true;
      updateInputPosition();
      window.visualViewport.addEventListener('resize', updateInputPosition);
      window.visualViewport.addEventListener('scroll', updateInputPosition);
    });

    answerInput.addEventListener('blur', function() {
      active = false;
      // 恢复到正常底部
      inputSection.style.position = 'fixed';
      inputSection.style.top = '';
      inputSection.style.bottom = '0';
      window.visualViewport.removeEventListener('resize', updateInputPosition);
      window.visualViewport.removeEventListener('scroll', updateInputPosition);
    });
  }
})();
</script>
</body>
